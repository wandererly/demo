<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>绩效目标与审批 | 人事一体化平台</title>
    <style>
      :root { --bg:#f6f2ea; --card:#fff; --border:#e6e1d8; --text:#1d2b36; --muted:#6f7b86; --primary:#1f8b6a; }
      body{margin:0;font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:linear-gradient(180deg,#f6f2ea 0%,#f2f7f4 100%);color:var(--text);} 
      .page{max-width:1100px;margin:32px auto 60px;padding:0 20px;}
      .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
      .title{font-size:26px;font-weight:700;}
      .subtitle{color:var(--muted);margin-top:6px;}
      .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 18px;box-shadow:0 10px 28px rgba(21,31,41,.08);margin-bottom:16px;}
      .table{width:100%;border-collapse:collapse;}
      .table th,.table td{padding:10px 12px;border-bottom:1px solid var(--border);text-align:left;font-size:14px;}
      .table th{color:var(--muted);font-weight:600;}
      .input{border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;width:100%;}
      .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}
      .btn{background:var(--primary);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-weight:600;cursor:pointer;}
      .btn-ghost{background:#f2f6f4;border:1px solid var(--border);border-radius:10px;padding:10px 16px;cursor:pointer;}
      .alert{padding:12px 14px;background:#fff0f0;border:1px solid #f5c2c2;color:#b54848;border-radius:10px;margin-bottom:12px;}
      a{color:#fff;text-decoration:none;}
    </style>
  </head>
  <body>
    <div class="page">
      <div class="header">
        <div>
          <div class="title">绩效目标 · 评分 · 审批流</div>
          <div class="subtitle">目标摘要、评分结果与审批状态一体化</div>
        </div>
        <div><a class="btn" href="/">返回系统</a></div>
      </div>

      <div id="alert" class="alert" style="display:none"></div>

      <div class="card">
        <div class="grid">
          <input class="input" id="cycleId" placeholder="绩效周期ID" value="1" />
          <button class="btn" id="loadBtn">加载绩效记录</button>
        </div>
      </div>

      <div class="card">
        <h3>审批操作</h3>
        <div class="grid">
          <input class="input" id="reviewId" placeholder="评估记录ID" />
          <input class="input" id="approverId" placeholder="审批人ID" />
          <select class="input" id="approvalStatus">
            <option value="APPROVED">通过</option>
            <option value="REJECTED">驳回</option>
            <option value="PENDING">待审批</option>
          </select>
          <input class="input" id="approvalComment" placeholder="审批意见" />
          <button class="btn" id="approveBtn">提交审批</button>
        </div>
      </div>

      <div class="card">
        <h3>绩效记录列表</h3>
        <table class="table" id="reviewTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>员工ID</th>
              <th>目标摘要</th>
              <th>评分</th>
              <th>等级</th>
              <th>审批状态</th>
              <th>审批人</th>
              <th>审批时间</th>
              <th>评语</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <script>
      const token = localStorage.getItem('hrm_token') || sessionStorage.getItem('hrm_token');
      const alertBox = document.getElementById('alert');
      function showAlert(msg){ alertBox.style.display='block'; alertBox.textContent=msg; }
      function apiGet(url){
        const headers = token ? { Authorization: 'Bearer ' + token } : {};
        return fetch(url,{headers}).then(r=>r.json()).then(d=>{ if(d.code!==0) throw new Error(d.message); return d.data;});
      }
      function apiPost(url, body){
        const headers = token ? { 'Content-Type':'application/json', Authorization: 'Bearer ' + token } : { 'Content-Type':'application/json' };
        return fetch(url,{method:'POST',headers,body:JSON.stringify(body)}).then(r=>r.json()).then(d=>{ if(d.code!==0) throw new Error(d.message); return d.data;});
      }
      function renderRows(rows){
        const tbody = document.querySelector('#reviewTable tbody');
        tbody.innerHTML = '';
        rows.forEach(r=>{
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${r.id}</td><td>${r.empId}</td><td>${r.goalSummary||''}</td><td>${r.score}</td><td>${r.level}</td><td>${r.approvalStatus||''}</td><td>${r.approverId||''}</td><td>${r.approvedAt||''}</td><td>${r.comment||''}</td>`;
          tbody.appendChild(tr);
        });
      }
      document.getElementById('loadBtn').onclick = function(){
        const cid = document.getElementById('cycleId').value || '1';
        apiGet('/api/performance/cycles/' + cid + '/reviews').then(renderRows).catch(e=>showAlert(e.message));
      };
      document.getElementById('approveBtn').onclick = function(){
        const id = document.getElementById('reviewId').value;
        if (!id) return showAlert('请输入评估记录ID');
        const body = {
          approvalStatus: document.getElementById('approvalStatus').value,
          approverId: document.getElementById('approverId').value ? Number(document.getElementById('approverId').value) : null,
          comment: document.getElementById('approvalComment').value
        };
        apiPost('/api/performance/reviews/' + id + '/approve', body)
          .then(()=>document.getElementById('loadBtn').click())
          .catch(e=>showAlert(e.message));
      };
    </script>
  </body>
</html>

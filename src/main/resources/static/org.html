<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>组织架构 | 人事一体化平台</title>
    <style>
      :root {
        --bg: #f6f2ea;
        --card: #ffffff;
        --muted: #6f7b86;
        --text: #1d2b36;
        --primary: #1f8b6a;
        --border: #e6e1d8;
        --chip: #f0f5f2;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        background: linear-gradient(180deg, #f6f2ea 0%, #f2f7f4 100%);
        color: var(--text);
      }
      .page {
        max-width: 1200px;
        margin: 32px auto 60px;
        padding: 0 20px;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
      }
      .title {
        font-size: 26px;
        font-weight: 700;
      }
      .subtitle { color: var(--muted); margin-top: 6px; }
      .actions a {
        display: inline-block;
        padding: 10px 16px;
        background: var(--primary);
        color: #fff;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 600;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 16px;
        margin-bottom: 20px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px 18px;
        box-shadow: 0 10px 28px rgba(21, 31, 41, 0.08);
      }
      .card h3 {
        margin: 0 0 10px;
        font-size: 16px;
      }
      .stat {
        font-size: 26px;
        font-weight: 700;
      }
      .chip {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--chip);
        color: var(--primary);
        font-size: 12px;
        margin-left: 6px;
      }
      .section {
        margin-top: 20px;
      }
      .section h2 {
        font-size: 18px;
        margin: 0 0 12px;
      }
      .table {
        width: 100%;
        border-collapse: collapse;
      }
      .table th, .table td {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        text-align: left;
        font-size: 14px;
      }
      .table th { color: var(--muted); font-weight: 600; }
      .alert {
        padding: 12px 14px;
        background: #fff0f0;
        border: 1px solid #f5c2c2;
        color: #b54848;
        border-radius: 10px;
        margin-bottom: 16px;
      }
      .org-list {
        display: grid;
        gap: 10px;
      }
      .dept {
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #fff;
      }
      .dept-title {
        font-weight: 700;
      }
      .muted { color: var(--muted); }
      .pill { padding: 2px 8px; border-radius: 6px; background: #f2f6f4; font-size: 12px; }
      .stack { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
      .link {
        color: var(--primary);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="header">
        <div>
          <div class="title">组织架构与晋升路径</div>
          <div class="subtitle">部门体系 · 岗位职级 · 晋升通道</div>
        </div>
        <div class="actions">
          <a href="/">返回系统</a>
        </div>
      </div>

      <div id="alert" class="alert" style="display:none"></div>

      <div class="grid">
        <div class="card">
          <h3>部门数量</h3>
          <div class="stat" id="stat-dept">-</div>
        </div>
        <div class="card">
          <h3>岗位数量</h3>
          <div class="stat" id="stat-position">-</div>
        </div>
        <div class="card">
          <h3>职级数量</h3>
          <div class="stat" id="stat-level">-</div>
        </div>
        <div class="card">
          <h3>晋升路径</h3>
          <div class="stat" id="stat-path">-</div>
        </div>
      </div>

      <div class="section card">
        <h2>组织架构概览</h2>
        <div class="org-list" id="org-list"></div>
      </div>

      <div class="section card">
        <h2>职级体系</h2>
        <table class="table" id="level-table">
          <thead>
            <tr>
              <th>职级编码</th>
              <th>职级名称</th>
              <th>等级</th>
              <th>薪资区间</th>
              <th>说明</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="section card">
        <h2>岗位清单</h2>
        <table class="table" id="position-table">
          <thead>
            <tr>
              <th>岗位编码</th>
              <th>岗位名称</th>
              <th>部门</th>
              <th>职级</th>
              <th>通道</th>
              <th>说明</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="section card">
        <h2>晋升路径</h2>
        <table class="table" id="path-table">
          <thead>
            <tr>
              <th>从岗位</th>
              <th>到岗位</th>
              <th>最短周期(月)</th>
              <th>条件说明</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <script>
      const token = localStorage.getItem('hrm_token') || sessionStorage.getItem('hrm_token');
      const alertBox = document.getElementById('alert');

      function showAlert(msg) {
        alertBox.style.display = 'block';
        alertBox.textContent = msg;
      }

      async function apiGet(url) {
        const headers = token ? { Authorization: 'Bearer ' + token } : {};
        const res = await fetch(url, { headers });
        const data = await res.json();
        if (!res.ok || data.code !== 0) {
          throw new Error(data.message || '请求失败');
        }
        return data.data;
      }

      function text(val, fallback) {
        if (val === null || val === undefined || val === '') return fallback;
        return val;
      }

      function byId(id) { return document.getElementById(id); }

      async function load() {
        if (!token) {
          showAlert('未检测到登录状态，请先登录系统。');
          return;
        }
        try {
          const [departments, employees, levels, positions, paths] = await Promise.all([
            apiGet('/api/departments'),
            apiGet('/api/employees'),
            apiGet('/api/org/levels'),
            apiGet('/api/org/positions'),
            apiGet('/api/org/paths')
          ]);

          byId('stat-dept').textContent = departments.length;
          byId('stat-position').textContent = positions.length;
          byId('stat-level').textContent = levels.length;
          byId('stat-path').textContent = paths.length;

          const empMap = new Map(employees.map(e => [e.id, e]));
          const deptMap = new Map(departments.map(d => [d.id, d]));
          const levelMap = new Map(levels.map(l => [l.id, l]));
          const posMap = new Map(positions.map(p => [p.id, p]));

          // Org list
          const orgList = byId('org-list');
          orgList.innerHTML = '';
          departments.forEach(dept => {
            const manager = empMap.get(dept.managerId);
            const node = document.createElement('div');
            node.className = 'dept';
            const managerName = manager ? manager.name + '（' + manager.position + '）' : '待指定';
            node.innerHTML = `
              <div class="dept-title">${text(dept.name, '未命名部门')} <span class="chip">${text(dept.status, 'ACTIVE')}</span></div>
              <div class="muted">负责人：${managerName}</div>
            `;
            orgList.appendChild(node);
          });

          // Levels
          const levelBody = byId('level-table').querySelector('tbody');
          levelBody.innerHTML = '';
          levels.forEach(l => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>${text(l.levelCode, '-')}</td>
              <td>${text(l.levelName, '-')}</td>
              <td>${text(l.rank, '-')}</td>
              <td>${text(l.salaryMin, '-')}-${text(l.salaryMax, '-')}</td>
              <td>${text(l.description, '')}</td>
            `;
            levelBody.appendChild(tr);
          });

          // Positions
          const posBody = byId('position-table').querySelector('tbody');
          posBody.innerHTML = '';
          positions.forEach(p => {
            const dept = deptMap.get(p.deptId);
            const level = levelMap.get(p.levelId);
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>${text(p.positionCode, '-')}</td>
              <td>${text(p.positionName, '-')}</td>
              <td>${dept ? dept.name : '-'}</td>
              <td>${level ? level.levelName : '-'}</td>
              <td><span class="pill">${text(p.pathGroup, '-')}</span></td>
              <td>${text(p.description, '')}</td>
            `;
            posBody.appendChild(tr);
          });

          // Promotion paths
          const pathBody = byId('path-table').querySelector('tbody');
          pathBody.innerHTML = '';
          paths.forEach(p => {
            const from = posMap.get(p.fromPositionId);
            const to = posMap.get(p.toPositionId);
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>${from ? from.positionName : '-'}</td>
              <td>${to ? to.positionName : '-'}</td>
              <td>${text(p.minMonths, '-') }</td>
              <td>${text(p.conditionText, '')}</td>
            `;
            pathBody.appendChild(tr);
          });
        } catch (err) {
          showAlert(err.message || '加载失败');
        }
      }

      load();
    </script>
  </body>
</html>

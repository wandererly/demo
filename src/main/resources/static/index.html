          dl.id = id;
          document.body.appendChild(dl);
        }
        return dl;
      }

      function fillDatalist(dl, items, getValue, getLabel) {
        dl.innerHTML = '';
        items.forEach(function(it) {
          var opt = document.createElement('option');
          opt.value = getValue(it);
          var label = getLabel(it);
          if (label) opt.label = label;
          dl.appendChild(opt);
        });
      }

      function applyLists() {
        var deptList = ensureDatalist('dept-list');
        var posList = ensureDatalist('position-list');

          return '<option value="' + String(o.value) + '">' + o.label + '</option>';
        }).join('');
        if (current) select.value = current;
      }

      function ensureExtraInput(afterInput, placeholder, key) {
        if (afterInput && afterInput.parentNode) {
          var parent = afterInput.parentNode;
          var existing = parent.querySelector('input[data-extra="' + key + '"]');
          if (existing) return existing;
          var input = document.createElement('input');
          input.className = afterInput.className;
          input.placeholder = placeholder;
          input.setAttribute('data-extra', key);
          input.setAttribute('readonly', 'readonly');
          parent.insertBefore(input, afterInput.nextSibling);
          return input;
        }
        return null;
      }

      function enhance(depts, positions, levels) {
        var inputs = Array.prototype.slice.call(document.querySelectorAll('input.input'));
        var statusOptions = [
          { value: 'ACTIVE', label: '在职(Active)' },
          { value: 'ON_LEAVE', label: '请假中' },
          { value: 'INACTIVE', label: '停用' },
          { value: 'RESIGNED', label: '离职' }
        ];

        var levelMap = new Map(levels.map(function(l){ return [l.id, l]; }));

              var label = (p.positionName || '') + ' / ' + (level.levelName || '-') + ' / ' + range;
              return { value: p.positionName, label: label };
            });
            ensureSelect(inp, posOptions);
          }
          if (ph.includes('状态')) {
            ensureSelect(inp, statusOptions);
          }

        // 联动：部门->岗位过滤 + 岗位->职级回填
        var cards = Array.prototype.slice.call(document.querySelectorAll('.card'));

          var deptInput = Array.prototype.slice.call(card.querySelectorAll('input.input')).find(function(inp){

          });

          var deptSelect = deptInput ? (deptInput._linkedSelect || deptInput.previousSibling) : null;
          var posSelect = posInput ? (posInput._linkedSelect || posInput.previousSibling) : null;

          function refreshPositions() {
            if (!posSelect) return;
            var deptId = deptSelect ? String(deptSelect.value || '') : '';
            var list = posByDept.get(deptId) || positions;
            var opts = list.map(function(p){
              var level = levelMap.get(p.levelId) || {};
              var range = level.salaryMin != null ? (level.salaryMin + '-' + level.salaryMax) : '-';
              var label = (p.positionName || '') + ' / ' + (level.levelName || '-') + ' / ' + range;
              return { value: p.positionName, label: label };
            });
            rebuildSelect(posSelect, opts);
          }

          function fillLevel() {
            if (!posSelect || !posInput) return;
            var selectedName = posSelect.value;
            var pos = positions.find(function(p){ return p.positionName === selectedName; });
            var level = pos ? levelMap.get(pos.levelId) : null;
            var levelInput = ensureExtraInput(posInput, '职级(自动)', 'auto-level');
            var rangeInput = ensureExtraInput(posInput, '薪资范围(自动)', 'auto-range');
            if (level) {
              levelInput.value = level.levelName || '';
              var range = level.salaryMin != null ? (level.salaryMin + '-' + level.salaryMax) : '';
              rangeInput.value = range;
            } else {
              if (levelInput) levelInput.value = '';
              if (rangeInput) rangeInput.value = '';
            }
          }

          if (deptSelect && !deptSelect.dataset.linkedV3) {
            deptSelect.dataset.linkedV3 = '1';
            deptSelect.addEventListener('change', function(){
              refreshPositions();

        var panel = document.createElement('section');
        panel.className = 'native-panel';
        panel.setAttribute('data-native-perf','1');
        panel.innerHTML = `
          <h3>绩效审批（原生）</h3>
          <div class="native-grid">
            <input class="native-input" id="np-cycleId" placeholder="绩效周期ID" value="1" />
            <button class="native-btn" id="np-load">加载绩效</button>
          </div>
          <div class="native-grid" style="margin-top:10px;">
            <input class="native-input" id="np-reviewId" placeholder="评估记录ID" />
            <input class="native-input" id="np-approverId" placeholder="审批人ID" />
            <select class="native-input" id="np-status">
              <option value="APPROVED">通过</option>
              <option value="REJECTED">驳回</option>
              <option value="PENDING">待审批</option>
            </select>
            <input class="native-input" id="np-comment" placeholder="审批意见" />
            <button class="native-btn" id="np-approve">提交审批</button>
          </div>
          <table class="native-table" style="margin-top:12px;">
            <thead>
              <tr><th>ID</th><th>员工ID</th><th>目标摘要</th><th>评分</th><th>等级</th><th>审批状态</th><th>审批人</th><th>审批时间</th><th>评语</th></tr>
            </thead>
            <tbody id="np-table"></tbody>
          </table>
        `;
        container.insertBefore(panel, container.firstChild);

        var table = panel.querySelector('#np-table');
        function render(rows){
          table.innerHTML='';
          rows.forEach(function(r){
            var tr=document.createElement('tr');
            tr.innerHTML = `<td>${r.id}</td><td>${r.empId}</td><td>${r.goalSummary||''}</td><td>${r.score}</td><td>${r.level}</td><td>${r.approvalStatus||''}</td><td>${r.approverId||''}</td><td>${r.approvedAt||''}</td><td>${r.comment||''}</td>`;
            table.appendChild(tr);
          });
        }
        panel.querySelector('#np-load').onclick = function(){
          var cid = panel.querySelector('#np-cycleId').value || '1';
          apiGet('/api/performance/cycles/' + cid + '/reviews').then(render).catch(()=>{});
        };
        panel.querySelector('#np-approve').onclick = function(){
          var id = panel.querySelector('#np-reviewId').value;
          if(!id) return;
          var body = {
            approvalStatus: panel.querySelector('#np-status').value,
            approverId: panel.querySelector('#np-approverId').value ? Number(panel.querySelector('#np-approverId').value) : null,
            comment: panel.querySelector('#np-comment').value
          };
          apiPost('/api/performance/reviews/' + id + '/approve', body)
            .then(()=>panel.querySelector('#np-load').click())
            .catch(()=>{});
        };
      }

      function mountPayroll(){
        var container = findMain();
        if (!container || container.querySelector('[data-native-payroll]')) return;
        var panel = document.createElement('section');
        panel.className = 'native-panel';
        panel.setAttribute('data-native-payroll','1');
        panel.innerHTML = `
          <h3>薪酬明细（原生）</h3>
          <div class="native-grid">
            <input class="native-input" id="np-base" placeholder="基础薪资" value="15000" />
            <input class="native-input" id="np-allow" placeholder="津贴" value="800" />
            <input class="native-input" id="np-bonus" placeholder="绩效奖金" value="1200" />
            <input class="native-input" id="np-otH" placeholder="加班小时" value="6" />
            <input class="native-input" id="np-otR" placeholder="加班时薪" value="80" />
            <input class="native-input" id="np-leave" placeholder="请假天数" value="1" />
            <input class="native-input" id="np-leaveDed" placeholder="请假扣款/天" value="200" />
            <input class="native-input" id="np-ss" placeholder="社保" value="500" />
            <input class="native-input" id="np-hf" placeholder="公积金" value="500" />
            <input class="native-input" id="np-tax" placeholder="税率(可空)" value="0.1" />
            <button class="native-btn" id="np-calc">计算</button>
          </div>
          <table class="native-table" style="margin-top:12px;">
            <thead><tr><th>税前合计</th><th>应税收入</th><th>税额</th><th>社保</th><th>公积金</th><th>税后实发</th></tr></thead>
            <tbody id="np-payroll-table"></tbody>
          </table>
        `;
        container.insertBefore(panel, container.firstChild);

        var tbody = panel.querySelector('#np-payroll-table');
        function render(r){
          tbody.innerHTML = '';
          var tr = document.createElement('tr');
          tr.innerHTML = `<td>${r.grossSalary}</td><td>${r.taxableIncome}</td><td>${r.tax}</td><td>${r.socialSecurity}</td><td>${r.housingFund}</td><td>${r.netSalary}</td>`;
          tbody.appendChild(tr);
        }
        panel.querySelector('#np-calc').onclick = function(){
          var body = {
            baseSalary: Number(panel.querySelector('#np-base').value || 0),
            allowance: Number(panel.querySelector('#np-allow').value || 0),
            bonus: Number(panel.querySelector('#np-bonus').value || 0),
            overtimeHours: Number(panel.querySelector('#np-otH').value || 0),
            overtimeRate: Number(panel.querySelector('#np-otR').value || 0),
            leaveDays: Number(panel.querySelector('#np-leave').value || 0),
            leaveDeductionPerDay: Number(panel.querySelector('#np-leaveDed').value || 0),
            socialSecurity: Number(panel.querySelector('#np-ss').value || 0),
            housingFund: Number(panel.querySelector('#np-hf').value || 0),
            taxRate: panel.querySelector('#np-tax').value === '' ? null : Number(panel.querySelector('#np-tax').value)
          };
          apiPost('/api/payroll/calc', body).then(render).catch(()=>{});
        };
      }

      function onRoute(){
        var path = location.pathname;
        if (path.startsWith('/performance')) {
          mountPerformance();
        }
        if (path.startsWith('/payroll')) {
          mountPayroll();
        }
      }
      var _push = history.pushState;
      history.pushState = function(){ _push.apply(this, arguments); setTimeout(onRoute, 50); };
      window.addEventListener('popstate', function(){ setTimeout(onRoute, 50); });
      setTimeout(onRoute, 200);
    })();
  </script>  </body>
</html>
